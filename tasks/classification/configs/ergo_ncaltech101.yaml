# ERGO-12 Configuration for N-Caltech101 Classification
# Paper: From Chaos Comes Order: Ordering Event Representations for Object Recognition and Detection
# Venue: ICCV 2023

method: ergo

dataset:
  name: N-Caltech101
  root: /content/ncaltech101
  split_file: data/splits/tonic_split_seed42.json
  num_classes: 101

representation:
  height: 180
  width: 240
  max_events: 50000
  input_channels: 12
  representation_type: "ERGO-12 (MixedDensityEventStack, SBN temporal windowing)"
  description: >
    12-channel dense event representation discovered via Bayesian optimization.
    7 temporal windows (SBN: full, thirds, last-half/quarter/eighth),
    7 feature functions (polarity, timestamp, count and their pos/neg variants),
    4 aggregations (sum, mean, max, variance).
    Reference: uzh-rpg/event_representation_study

training:
  epochs: 100
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: Adam
  scheduler: CosineAnnealingLR
  scheduler_params:
    T_max: 100
    eta_min: 1.0e-6
  seed: 42
  num_workers: 4

evaluation:
  metrics:
    - top1_accuracy
    - params_M
    - MACs_G
    - FLOPs_G
    - GPU_forward_peak_memory_MB
    - input_tensor_memory_MB
    - storage_best_model_MB
    - input_nonzero_ratio
    - output_nonzero_ratio
    - event_utilization_ratio
  robustness:
    input_sparsity:
      keep_ratios: [1.0, 0.8, 0.6, 0.4, 0.2]
    noise_robustness:
      sigmas: [0, 0.01, 0.05, 0.10, 0.20]
    event_density:
      max_events: [5000, 10000, 20000, 50000]

limitations:
  - "ERGO-12 channel config from Bayesian optimization; this is an independent numpy/torch implementation."
  - "channel-wise min-max normalization applied in build(); not explicitly described in the paper."
  - "SBN window boundaries: [0,N], [0,N/3], [N/3,2N/3], [2N/3,N], [N/2,N], [3N/4,N], [7N/8,N]."
  - "batch_size=32 and num_workers=4 match EvRepSL baseline for fair comparison."
