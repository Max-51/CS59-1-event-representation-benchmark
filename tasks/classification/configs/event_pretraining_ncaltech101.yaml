dataset:
  name: N-Caltech101
  num_classes: 101
  root: /content/ncaltech101
  split_file: data/splits/tonic_split_seed42.json
evaluation:
  metrics:
  - top1_accuracy
  - params_M
  - MACs_G
  - FLOPs_G
  - gpu_forward_peak_mem_MB
  - input_tensor_mem_MB
  - storage_MB
  - input_nonzero_ratio
  - output_nonzero_ratio
  - event_utilization_ratio
  robustness:
    max_events_sweep:
    - 5000
    - 10000
    - 20000
    - 50000
    noise_sigmas:
    - 0
    - 0.01
    - 0.05
    - 0.1
    - 0.2
    sparsity_keep_ratios:
    - 1.0
    - 0.8
    - 0.6
    - 0.4
    - 0.2
experiment_type: small_scale_simclr_pretrain
finetuning:
  batch_size: 32
  early_stopping: true
  epochs: 100
  lr: 0.0001
  mode: full_finetuning
  num_workers: 4
  optimizer: AdamW
  patience: 10
  scheduler: CosineAnnealingLR
  seed: 42
  weight_decay: 0.0001
limitations: 原论文使用 N-ImageNet + ImageNet 双模态对比预训练（MoCo V3, ViT backbone）。本实验为小规模适配：单模态
  SimCLR on N-Caltech101 + ResNet-18，保留预训练→微调范式与 polarity encoding，非完整复现。
method: event_pretraining
pretraining:
  augmentations:
  - random_horizontal_flip
  - random_vertical_flip
  - gaussian_noise
  - random_erasing
  - polarity_swap
  batch_size: 32
  epochs: 100
  lr: 0.001
  method: SimCLR
  num_workers: 4
  seed: 42
  temperature: 0.5
  weight_decay: 0.0001
representation:
  channels: 2
  description: 2-channel polarity accumulation (pos ch0, neg ch1), normalised [0,1]
  height: 224
  max_events: 50000
  name: event_pretraining
  width: 224
