method: matrix_lstm
dataset:
  name: N-Caltech101
  root: /content/ncaltech101
  split_file: data/splits/tonic_split_seed42.json
  num_classes: 101
representation:
  height: 180
  width: 240
  hidden_size: 16
  surface_channels: 16
  max_events: 15000
  max_events_per_rf: 32
training:
  epochs: 100
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: Adam
  scheduler: CosineAnnealingLR
  seed: 42
  num_workers: 4
  early_stopping: true
  patience: 10
limitations:
- Official CUDA extensions (matrixlstm_helpers.cu) replaced by pack_padded_sequence.
- Input resolution 180x240 vs original 224x224.
- No ImageNet-pretrained backbone (original uses resnet_pretrain=True).
- 'max_events reduced to 15000 (original: no global cap).'
- 'max_events_per_rf reduced to 32 (original default: 512) for Colab efficiency.'
