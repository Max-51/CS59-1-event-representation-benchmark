# EST Classification on N-Caltech101
# EST-style dense event tensor adaptation for benchmark pipeline.
# NOTE: This uses bilinear temporal interpolation (not the original learnable QuantizationLayer).
# implementation_type: EST-style dense event tensor adaptation

method: est

dataset:
  name: N-Caltech101
  save_to: /content/ncaltech101
  split_file: data/splits/tonic_split_seed42.json
  num_classes: 101

representation:
  height: 180
  width: 240
  num_bins: 9
  max_events: 50000
  input_channels: 18          # = 2 * num_bins

training:
  epochs: 100
  batch_size: 32              # reduce to 16/8 if CUDA OOM
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: adam
  scheduler: cosine_annealing  # CosineAnnealingLR, T_max=epochs
  seed: 42
  num_workers: 4              # reduce to 2/0 if DataLoader hangs

checkpoints:
  dir: /content/drive/MyDrive/est_checkpoints
  best_model: best_model.pth
  latest: latest_checkpoint.pth

evaluation:
  metrics:
    - top1_accuracy
    - params_M
    - macs_G
    - flops_G
    - gpu_forward_peak_memory_MB
    - input_tensor_memory_MB
    - storage_MB
    - input_nonzero_ratio
    - output_nonzero_ratio
    - event_utilization_ratio
  robustness:
    sparsity_keep_ratios: [1.0, 0.8, 0.6, 0.4, 0.2]
    noise_sigma: [0.0, 0.01, 0.05, 0.10, 0.20]
    max_events_sensitivity: [5000, 10000, 20000, 50000]
