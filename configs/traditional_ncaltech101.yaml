dataset:
  name: N-Caltech101
  split_file: data/splits/tonic_split_seed42.json
  val_fraction_from_train: 0.1
  num_classes: 101

representation:
  methods:
    - event_frame
    - binary_event_image
    - timestamp_image
    - time_surface
    - voxel_grid
  height: 180
  width: 240
  bins: 5
  max_events: 50000

training:
  downstream_model: ResNet18
  epochs: 100
  early_stop_patience: 10
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42
  num_workers: 4

outputs:
  root: outputs/traditional/classification/ncaltech101
